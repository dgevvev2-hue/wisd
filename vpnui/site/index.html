const API_BASE=location.protocol==='file:'?'http://192.168.0.1:8083':'';
const $=id=>document.getElementById(id), apiUrl=u=>u.startsWith('http')?u:API_BASE+u;
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const T={on:'\u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u043e',off:'\u041e\u0442\u043a\u043b\u044e\u0447\u0435\u043d\u043e',noServer:'\u0421\u0435\u0440\u0432\u0435\u0440 \u043d\u0435 \u0432\u044b\u0431\u0440\u0430\u043d',ok:'OK',err:'\u041e\u0448\u0438\u0431\u043a\u0430',empty:'\u041f\u0443\u0441\u0442\u043e',importing:'\u0418\u043c\u043f\u043e\u0440\u0442...',pinging:'Ping...'};
let nodes=[],pings={},subs=[],devices=[],st={enabled:false,running:false,id:'',mode:'tunnel',elapsed:0},mode=localStorage.getItem('rvpn-mode')||'tunnel',routeMode=localStorage.getItem('rvpn-route-mode')||'direct',rules=[],sel={targets:[]},elapsedBase=0,elapsedAt=Date.now();
async function j(url){let r=await fetch(apiUrl(url),{cache:'no-store'}),t=await r.text();try{return JSON.parse(t)}catch(e){throw new Error(t.slice(0,180)||r.statusText)}}
async function vpn(action,params={}){return j('/cgi-bin/vpn.cgi?'+new URLSearchParams({action,...params}))}
function toastMsg(s){let d=document.createElement('div');d.textContent=s;toast.appendChild(d);setTimeout(()=>d.remove(),2600)}
function fmt(s){s=Math.max(0,Math.floor(s||0));return [Math.floor(s/3600),Math.floor(s%3600/60),s%60].map(x=>String(x).padStart(2,'0')).join(':')}
function kbLine(s){let p=String(s||'').split('|');return p.length<4?'?':`${(Number(p[2]||0)/1024).toFixed(0)} MB free / ${p[3]||''}`}
function tick(){timer.textContent=st.enabled?fmt(elapsedBase+(Date.now()-elapsedAt)/1000):'00:00:00'}setInterval(tick,1000);
const cc={turkey:'tr',sweden:'se',spain:'es',russia:'ru',france:'fr',germany:'de',japan:'jp',latvia:'lv',romania:'ro',singapore:'sg',usa:'us',uae:'ae',belgium:'be',australia:'au',hongkong:'hk',canada:'ca',poland:'pl',netherlands:'nl',finland:'fi',italy:'it',austria:'at',uk:'gb','united kingdom':'gb',ireland:'ie',india:'in',brazil:'br',china:'cn',korea:'kr'};
function flagCode(n){let s=String(n||'').toLowerCase();let m=s.match(/\b([a-z]{2})\b/);if(m&&['nl','de','tr','ru','fr','pl','se','es','us','gb','sg','jp','hk','ae','lv','ro','be','au','fi','it'].includes(m[1]))return m[1];for(let k in cc)if(s.includes(k))return cc[k];return ''}
function flagImg(n){let c=flagCode((n.name||'')+' '+(n.host||''));return c?`<img class="flag" src="assets/flags/${c}.svg" alt="">`:'<span class="flag">GL</span>'}
function activeNode(){return nodes.find(n=>String(n.id)===String(st.id))}
function pingOf(n){return pings[n.id]!==undefined?pings[n.id]:n.ping}
function pingText(n){let p=pingOf(n);return p==null?'<span class="timeout">нет ответа</span>':`${Number(p).toFixed(1)} ms`}
function setMode(m){mode=m==='proxy'?'proxy':'tunnel';localStorage.setItem('rvpn-mode',mode);[modeTunnel,modeTunnel2].forEach(b=>b.classList.toggle('active',mode==='tunnel'));[modeProxy,modeProxy2].forEach(b=>b.classList.toggle('active',mode==='proxy'))}
function setRouteUi(m){routeMode=m==='vpn'?'vpn':'direct';localStorage.setItem('rvpn-route-mode',routeMode);routeDirect.classList.toggle('active',routeMode==='direct');routeVpn.classList.toggle('active',routeMode==='vpn');renderRouteList()}
async function switchRouteMode(m){setRouteUi(m);if(routeMode==='direct'){await j('/cgi-bin/selective.cgi?action=disable')}else{await j('/cgi-bin/selective.cgi?action=enable')}await loadSelective();await loadStatus();toastMsg(T.ok)}
function shownNodes(){let q=search.value.trim().toLowerCase();return nodes.filter(n=>(String(n.name)+' '+String(n.host)+' '+String(n.network||'')).toLowerCase().includes(q))}
function render(){let n=activeNode();statusDot.className='dot '+(st.enabled?'on':'');power.className='power '+(st.enabled?'':'off');statusText.textContent=st.enabled?T.on:T.off;currentName.textContent=n?n.name:T.noServer;currentMeta.innerHTML=n?`${esc(n.host)} / ${pingText(n)} / ${esc((st.mode||mode).toUpperCase())}`:'VPN off';servers.innerHTML=shownNodes().map(n=>`<article class="server ${String(n.id)===String(st.id)?'active':''}"><div class="serverTop">${flagImg(n)}<div class="serverText"><div class="serverName">${esc(n.name)}</div><div class="meta serverHost">${esc(n.host)} / ${esc(n.network||'tcp')}</div></div></div><div></div><div class="serverBottom"><div class="ping">${pingText(n)}</div><button onclick="connectNode(${Number(n.id)})">ON</button></div></article>`).join('')||`<div class="empty">${T.empty}</div>`;updateMaskText()}
async function loadStatus(){st=await vpn('status');elapsedBase=Number(st.elapsed||0);elapsedAt=Date.now();if(st.mode)setMode(st.mode);render();tick()}
async function connectNode(id){log.textContent='...';try{let r=await vpn('connect',{id,mode});log.textContent=r.message||T.ok;await loadStatus();toastMsg(log.textContent)}catch(e){log.textContent=T.err+': '+e.message}}
async function disconnect(){try{await vpn('disconnect');await loadStatus();log.textContent=T.off;toastMsg(T.off)}catch(e){log.textContent=T.err+': '+e.message}}
async function restart(){try{await vpn('restart',{id:st.id||2});await loadStatus();log.textContent='Restart OK';toastMsg('Restart OK')}catch(e){log.textContent=T.err+': '+e.message}}
async function loadNodes(){nodes=await j('/nodes.json?ts='+Date.now());render()}
async function refreshPing(){pingBtn.disabled=true;reloadBtn.disabled=true;log.textContent=T.pinging;try{let d=await j('/cgi-bin/ping.cgi?action=all');pings=d.pings||{};log.textContent=`Ping: ${Object.keys(pings).length}/${nodes.length}`;render();toastMsg(T.ok)}catch(e){log.textContent=T.err+': '+e.message}finally{pingBtn.disabled=false;reloadBtn.disabled=false}}
async function loadRules(){try{let d=await j('/cgi-bin/rules.cgi?action=list');rules=d.rules||[]}catch(e){rules=[]}renderRouteList()}
async function loadSelective(){try{sel=await j('/cgi-bin/selective.cgi?action=status');setRouteUi(sel.enabled?'vpn':'direct')}catch(e){sel={targets:[]}}renderRouteList()}
function routeItems(){return routeMode==='direct'?rules:(sel.targets||[])}
function renderRouteList(){let list=routeItems();routeList.innerHTML=list.length?list.map((x,i)=>`<span class="chip">${esc(x)}<button onclick="deleteRouteIndex(${i})">x</button></span>`).join(''):`<div class="empty">${T.empty}</div>`}
async function addRoute(){let v=routeInput.value.trim();if(!v)return;if(routeMode==='direct'){await j('/cgi-bin/rules.cgi?action=add&value='+encodeURIComponent(v));await j('/cgi-bin/selective.cgi?action=disable');await loadRules();await loadSelective()}else{await j('/cgi-bin/selective.cgi?action=add_target&value='+encodeURIComponent(v));await j('/cgi-bin/selective.cgi?action=enable');await loadSelective()}routeInput.value='';await loadStatus();toastMsg(T.ok)}
async function deleteRoute(v){if(routeMode==='direct'){await j('/cgi-bin/rules.cgi?action=delete&value='+v);await loadRules()}else{await j('/cgi-bin/selective.cgi?action=del_target&value='+v);await loadSelective()}await loadStatus();toastMsg(T.ok)}
async function deleteRouteIndex(i){let x=routeItems()[i];if(!x)return;await deleteRoute(encodeURIComponent(x))}
async function addRuPreset(){await j('/cgi-bin/rules.cgi?action=preset_ru');await j('/cgi-bin/selective.cgi?action=disable');setRouteUi('direct');await loadRules();await loadSelective();await loadStatus();toastMsg(T.ok)}
function clientTitle(d){return d.name||d.hostname||((d.ip?('\u041a\u043b\u0438\u0435\u043d\u0442 .'+String(d.ip).split('.').pop()):''))||d.mac||d.ip}
let clientsLoading=false;
function uniqueClients(list){let seen=new Set(),out=[];(list||[]).forEach(d=>{let k=(d.mac||d.ip||'').toLowerCase();if(!k||seen.has(k))return;seen.add(k);out.push(d)});return out}
async function loadClients(){if(clientsLoading)return;clientsLoading=true;let y=clientList.scrollTop;try{let d=await j('/cgi-bin/devices.cgi?action=list');devices=uniqueClients(d.devices)}catch(e){devices=[]}finally{clientsLoading=false}renderClients();clientList.scrollTop=y}
function renderClients(){clientList.innerHTML=devices.length?devices.map((d,i)=>`<div class="clientItem ${d.vpnAllowed?'allowed':''}" data-i="${i}" oncontextmenu="openClientMenu(event,${i})"><div class="clientTop"><div><div class="clientName">${esc(clientTitle(d))}</div><div class="meta">${esc(d.ip)} / ${esc(d.mac)} / ${esc(d.iface||'br2')} / ${esc(d.vendor||d.type||'Device')}${d.private?' / \u0447\u0430\u0441\u0442\u043d\u044b\u0439 MAC':''}</div></div><button class="iconBtn" onclick="openClientMenu(event,${i})">...</button></div><span class="clientBadge">${d.vpnAllowed?'VPN \u0440\u0430\u0437\u0440\u0435\u0448\u0451\u043d':'VPN \u0437\u0430\u0431\u043b\u043e\u043a\u0438\u0440\u043e\u0432\u0430\u043d'}</span></div>`).join(''):`<div class="empty">${T.empty}</div>`}
function closeClientMenu(){clientMenu.classList.remove('open');clientMenu.innerHTML=''}
function openClientMenu(e,i){e.preventDefault();e.stopPropagation();let d=devices[i];if(!d)return;clientMenu.innerHTML=`<button onclick="toggleClientVpn(${i})">${d.vpnAllowed?'\u0417\u0430\u043f\u0440\u0435\u0442\u0438\u0442\u044c VPN':'\u0420\u0430\u0437\u0440\u0435\u0448\u0438\u0442\u044c VPN'}</button><button onclick="renameClient(${i})">\u041f\u0435\u0440\u0435\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u0442\u044c</button>`;clientMenu.style.left=Math.min(e.clientX||20,window.innerWidth-210)+'px';clientMenu.style.top=Math.min(e.clientY||20,window.innerHeight-110)+'px';clientMenu.classList.add('open')}
async function toggleClientVpn(i){let d=devices[i];if(!d||!d.ip)return;closeClientMenu();let a=d.vpnAllowed?'block_vpn':'allow_vpn';d.vpnAllowed=!d.vpnAllowed;renderClients();await j('/cgi-bin/devices.cgi?action='+a+'&ip='+encodeURIComponent(d.ip)+'&mac='+encodeURIComponent(d.mac||''));await loadClients();await loadStatus();toastMsg(T.ok)}
async function renameClient(i){let d=devices[i];if(!d||!d.mac)return;closeClientMenu();let name=prompt('\u0418\u043c\u044f \u043a\u043b\u0438\u0435\u043d\u0442\u0430',clientTitle(d));if(name==null)return;await j('/cgi-bin/devices.cgi?action=rename&mac='+encodeURIComponent(d.mac)+'&name='+encodeURIComponent(name.trim()));await loadClients();toastMsg(T.ok)}
async function loadDns(){try{let d=await j('/cgi-bin/dns.cgi?action=status');dnsText.textContent=(d.mode||'')+' / '+(d.resolvers||'')}catch(e){dnsText.textContent=T.err+': '+e.message}}
async function setDns(m){await j('/cgi-bin/dns.cgi?action=apply&mode='+encodeURIComponent(m));await loadDns();toastMsg(T.ok)}
async function loadInfo(){try{let d=await j('/cgi-bin/info.cgi');sysGrid.innerHTML=`<div class="sys"><span class="label">RAM</span><b>${(Number(d.memFree||0)/1024).toFixed(0)} MB</b></div><div class="sys"><span class="label">Load</span><b>${esc(d.load||'?')}</b></div><div class="sys"><span class="label">Up</span><b>${fmt(d.uptime)}</b></div>`;xrayText.innerHTML=`Xray: ${esc(d.xrayVersion||'unknown')}<br>XHTTP: ${d.xrayXhttp?'yes':'unknown'}<br>VPN: ${d.services&&d.services.vpn?'ON':'OFF'}`;await loadRouter()}catch(e){xrayText.textContent=T.err+': '+e.message}}
async function loadRouter(){try{let d=await j('/cgi-bin/system.cgi?action=status');routerText.innerHTML=`HTTP: ${d.httpd?'ON':'OFF'} / RAM: ${d.ramReady?'OK':'NO'} / USB: ${d.usbReady?'OK':'NO'}<br>Router uptime: ${fmt(d.uptime)}<br>RAM disk: ${esc(kbLine(d.tmp))}<br>USB: ${esc(kbLine(d.usb))}`}catch(e){routerText.textContent=T.err+': '+e.message}}
async function ramStart(){ramBtn.disabled=true;routerText.textContent='RAM start...';try{let d=await j('/cgi-bin/system.cgi?action=ram');await loadRouter();toastMsg(d.ok?T.ok:T.err)}catch(e){routerText.textContent=T.err+': '+e.message}finally{ramBtn.disabled=false}}
async function siteRestart(){siteRestartBtn.disabled=true;try{await j('/cgi-bin/system.cgi?action=httpd');toastMsg('Site restarted')}catch(e){toastMsg(T.err+': '+e.message)}finally{setTimeout(()=>siteRestartBtn.disabled=false,1500)}}
async function rebootRouter(){if(!confirm('Reboot router?'))return;rebootBtn.disabled=true;try{await j('/cgi-bin/system.cgi?action=reboot');routerText.textContent='Rebooting...';toastMsg('Rebooting')}catch(e){routerText.textContent=T.err+': '+e.message}finally{setTimeout(()=>rebootBtn.disabled=false,8000)}}
async function clearLogs(){await vpn('clearlogs');toastMsg(T.ok);log.textContent=T.ok}
function renderSubs(){subList.innerHTML=subs.length?subs.map(s=>`<div class="subItem ${s.active?'active':''}"><div class="subTop"><div><b>${esc(s.name||s.url)}</b><div class="meta">${esc(s.url)}</div></div><span class="chip">${s.count||0}</span></div><div class="subActions"><button class="btn primary" onclick="selectSub('${encodeURIComponent(s.id)}')">\u0412\u044b\u0431\u0440\u0430\u0442\u044c</button><button class="btn" onclick="updateSub('${encodeURIComponent(s.id)}')">\u041e\u0431\u043d\u043e\u0432\u0438\u0442\u044c</button><button class="btn red" onclick="deleteSub('${encodeURIComponent(s.id)}')">\u0423\u0434\u0430\u043b\u0438\u0442\u044c</button></div></div>`).join(''):`<div class="empty">${T.empty}</div>`}
async function loadSubs(){try{let d=await j('/cgi-bin/subscription.cgi?action=list');subs=d.items||[];renderSubs()}catch(e){subList.innerHTML=`<div class="empty">${T.err}: ${esc(e.message)}</div>`}}
async function importSub(){let url=subUrl.value.trim();if(!url)return;importBtn.disabled=true;subText.textContent=T.importing;try{let q=new URLSearchParams({action:'save',url:url,name:subName.value.trim()||'Subscription'});let d=await j('/cgi-bin/subscription.cgi?'+q);subText.textContent=d.message||T.ok;await loadSubs();await loadNodes();toastMsg(T.ok)}catch(e){subText.textContent=T.err+': '+e.message}finally{importBtn.disabled=false}}
async function updateSub(id){subText.textContent=T.importing;try{let d=await j('/cgi-bin/subscription.cgi?action=update&id='+id);subText.textContent=d.message||T.ok;await loadSubs();await loadNodes();toastMsg(T.ok)}catch(e){subText.textContent=T.err+': '+e.message}}
async function selectSub(id){subText.textContent=T.importing;try{let d=await j('/cgi-bin/subscription.cgi?action=select&id='+id);subText.textContent=d.message||T.ok;await loadSubs();await loadNodes();toastMsg(T.ok)}catch(e){subText.textContent=T.err+': '+e.message}}
async function deleteSub(id){if(!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0443?'))return;try{await j('/cgi-bin/subscription.cgi?action=delete&id='+id);await loadSubs();toastMsg(T.ok)}catch(e){subText.textContent=T.err+': '+e.message}}
function setPage(id){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.page===id));document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===id));if(id==='clientsPage')loadClients();if(id==='subsPage')loadSubs();if(id==='systemPage')loadInfo();if(id==='securityPage')loadDns()}
function openSettings(page){settingsModal.classList.add('open');loadRules();loadSelective();loadDns();loadInfo();if(page)setPage(page)}
function updateMaskText(){let n=activeNode();let mask=localStorage.getItem('rvpn-mask')||'auto';maskText.textContent=n?`Mode: ${mask}. ${n.network==='tcp'||n.network==='xhttp'||n.network==='splithttp'?'Available if server config supports SNI/Reality.':'Limited for this transport.'}`:'Choose server first. Masking only changes supported SNI/fingerprint/spiderX fields.'}
function closeModal(id){$(id).classList.remove('open')}
settingsBtn.onclick=()=>openSettings();navSettings.onclick=()=>openSettings();openSettings2.onclick=()=>openSettings();subBtn.onclick=()=>openSettings('subsPage');subTopBtn.onclick=()=>openSettings('subsPage');document.addEventListener('click',closeClientMenu);document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closeModal(b.dataset.close));document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setPage(b.dataset.page));
modeTunnel.onclick=()=>setMode('tunnel');modeProxy.onclick=()=>setMode('proxy');modeTunnel2.onclick=()=>setMode('tunnel');modeProxy2.onclick=()=>setMode('proxy');power.onclick=()=>st.enabled?disconnect():connectNode(st.id||2);offBtn.onclick=disconnect;restartBtn.onclick=restart;pingBtn.onclick=refreshPing;reloadBtn.onclick=async()=>{await loadNodes();await loadStatus();toastMsg(T.ok)};search.oninput=render;routeDirect.onclick=()=>switchRouteMode('direct');routeVpn.onclick=()=>switchRouteMode('vpn');routeAdd.onclick=addRoute;routeRuPreset.onclick=addRuPreset;routeInput.onkeydown=e=>{if(e.key==='Enter')addRoute()};importBtn.onclick=importSub;clearBtn.onclick=clearLogs;refreshInfoBtn.onclick=loadInfo;ramBtn.onclick=ramStart;siteRestartBtn.onclick=siteRestart;rebootBtn.onclick=rebootRouter;document.querySelectorAll('[data-dns]').forEach(b=>b.onclick=()=>setDns(b.dataset.dns));document.querySelectorAll('[data-theme]').forEach(b=>b.onclick=()=>{let t=b.dataset.theme;document.documentElement.dataset.theme=t==='dark'?'':t;localStorage.setItem('rvpn-theme',t)});document.querySelectorAll('.mask').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mask').forEach(x=>x.classList.remove('active'));b.classList.add('active');localStorage.setItem('rvpn-mask',b.dataset.mask);updateMaskText()});
async function boot(){document.documentElement.dataset.theme=(localStorage.getItem('rvpn-theme')||'dark').replace('dark','');let mask=localStorage.getItem('rvpn-mask')||'auto';document.querySelectorAll('.mask').forEach(b=>b.classList.toggle('active',b.dataset.mask===mask));setMode(mode);setRouteUi(routeMode);statusText.textContent=T.off;currentName.textContent=T.noServer;currentMeta.textContent='API '+API_BASE;log.textContent='...';await loadNodes();await loadStatus();await loadRules();await loadSelective();await loadClients();await loadDns();await loadInfo();await loadSubs();log.textContent=T.ok;setInterval(loadStatus,30000)}
boot().catch(e=>{log.textContent=T.err+': '+e.message});
</script>
</body>
</html>
