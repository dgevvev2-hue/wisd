# wisd web panel nginx site config.
# Drop into /etc/nginx/sites-available/wisd and symlink to sites-enabled/.

# Map for the WS upgrade header (needed by the VLESS-WS passthrough).
map $http_upgrade $wisd_ws_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/wisd;
    index index.html;

    access_log /var/log/nginx/wisd.access.log;
    error_log  /var/log/nginx/wisd.error.log;

    # VLESS-WS passthrough — this enables routing via a Cloudflare Worker.
    # The Worker fetches http://<vps>:80/<wsPath>, this location passes the
    # WS upgrade through to the local xray VLESS-WS inbound on 127.0.0.1:10443.
    # Path is sourced from /var/lib/wisd/server.json (.wsPath) and substituted
    # into the include file below by deploy/install.sh.
    include /etc/nginx/wisd-ws.location*;

    # Static site
    location / {
        try_files $uri $uri/ =404;
    }

    # CGI scripts under /cgi-bin/ are executed via fcgiwrap.
    location ^~ /cgi-bin/ {
        gzip off;
        include /etc/nginx/fastcgi_params;
        fastcgi_pass unix:/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /var/www/wisd$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/wisd;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_read_timeout 60s;
    }

    client_max_body_size 1m;
}
