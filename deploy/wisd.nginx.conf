# wisd web panel nginx site config.
#
#   :80 HTTP    -- WS passthrough (CF Worker), ACME challenge, plus EITHER:
#                  - panel served over HTTP (no domain / no TLS)
#                  - 301 redirect to HTTPS :4443 (after certbot)
#   :4443 HTTPS -- the auth-protected panel (server block lives in
#                  /etc/nginx/wisd-https.server, generated by install.sh
#                  once certbot has a real cert on disk).
#
# install.sh manages /etc/nginx/wisd-http-mode.conf and /etc/nginx/wisd-https.server.

map $http_upgrade $wisd_ws_upgrade {
    default upgrade;
    ''      close;
}

# ----------------------------------------------------------------------------
# HTTP :80 -- always live
# ----------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/wisd;
    index index.html;

    access_log /var/log/nginx/wisd.access.log;
    error_log  /var/log/nginx/wisd.error.log;

    # VLESS-WS passthrough for the Cloudflare Worker relay.
    include /etc/nginx/wisd-ws.location*;

    # ACME http-01 challenge for Let's Encrypt cert issue/renewal.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type text/plain;
        try_files $uri =404;
    }

    # Either "panel" or "redirect to HTTPS" — generated by install.sh.
    include /etc/nginx/wisd-http-mode*;

    client_max_body_size 1m;
}

# ----------------------------------------------------------------------------
# HTTPS :4443 -- auth-protected panel (loaded only when TLS is set up)
# ----------------------------------------------------------------------------
include /etc/nginx/wisd-https.server*;
