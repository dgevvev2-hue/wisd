# wisd: VPN stability tuning
# Enables BBR congestion control + better buffers + faster keepalive.
# Applied via /etc/sysctl.d/99-wisd-net.conf by deploy/install.sh.

net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_fastopen=3

# Larger socket buffers for high-latency / lossy links
net.core.rmem_max=67108864
net.core.wmem_max=67108864
net.core.rmem_default=4194304
net.core.wmem_default=4194304
net.ipv4.tcp_rmem=4096 87380 67108864
net.ipv4.tcp_wmem=4096 65536 67108864

# Faster TCP keepalive so dead VPN sessions get cleaned up quickly
net.ipv4.tcp_keepalive_time=60
net.ipv4.tcp_keepalive_intvl=10
net.ipv4.tcp_keepalive_probes=6

# MTU probing so VPN works on misconfigured-MTU links
net.ipv4.tcp_mtu_probing=1

# UDP buffers (Hysteria2 wants this)
net.ipv4.udp_rmem_min=8192
net.ipv4.udp_wmem_min=8192

# Larger backlog for bursts
net.core.netdev_max_backlog=4096
